<!DOCTYPE html>
<html>
  <head>
    <title>Novel Dialogue Enhancer</title>
    <link rel="stylesheet" href="popup.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
  </head>

  <body>
    <div class="header" id="header">
      <h1>Novel Dialogue Enhancer</h1>
      <div class="kofi-wrap">
        <a href="https://ko-fi.com/adhin/tip" target="_blank" class="kofi-btn icon-button" title="Buy me a coffee">
          <svg class="kofi-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M18 8h1a4 4 0 010 8h-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <line class="kofi-steam kofi-steam-1" x1="6"  y1="1" x2="6"  y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line class="kofi-steam kofi-steam-2" x1="10" y1="1" x2="10" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line class="kofi-steam kofi-steam-3" x1="14" y1="1" x2="14" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span class="kofi-tooltip">Buy me a coffee ☕</span>
        </a>
      </div>
      <button
        id="pause-button"
        data-testid="pause-button"
        class="icon-button"
        title="Pause/Resume Extension"
      >
        <i class="fas fa-pause" id="pause-icon" data-testid="pause-icon"></i>
      </button>
    </div>

    <div class="main-content">
      <div class="whitelist-section">
        <div class="site-info">
          <span id="current-site" data-testid="current-site">Current site</span>
          <button id="whitelist-button" data-testid="whitelist-button" class="whitelist-button">
            <i class="fas fa-bookmark"></i>
            <span id="whitelist-text" data-testid="whitelist-text">Add to Whitelist</span>
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="toggle-container">
        <span>Preserve Names</span>
        <label class="toggle">
          <input type="checkbox" id="preserve-names-toggle" data-testid="preserve-names-toggle" checked />
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-container">
        <span>Fix Pronouns</span>
        <label class="toggle">
          <input type="checkbox" id="fix-pronouns-toggle" data-testid="fix-pronouns-toggle" checked />
          <span class="slider"></span>
        </label>
      </div>

      <button id="enhance-now-btn" data-testid="enhance-now-btn">Enhance Current Page</button>

      <div class="status" id="status-message" data-testid="status-message">Ready</div>
    </div>

    <div class="footer">
      <a href="../options/options.html" target="_blank">Advanced Settings</a>
    </div>
    <script src="popup.min.js"></script>
  </body>
</html>
