name: Build and Release Extension

on:
  push:
    tags:
      - 'v[0-9].[0-9]*.[0-9]*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: alpine:latest
    permissions:
      contents: write

    steps:
      - name: Install dependencies (Alpine)
        run: |
          apk add --no-cache git zip jq bash sed nodejs npm curl

      - name: Checkout Code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory '*'
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git fetch --tags
          git checkout "${GITHUB_REF_NAME}"

      - name: Validate tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG"
            exit 1
          fi

      - name: Update Manifest Version
        run: |
          NEW_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          jq ".version = \"$NEW_VERSION\"" manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          
      - name: Update Package Version
        run: |
          NEW_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          jq ".version = \"$NEW_VERSION\"" package.json > package.tmp && mv package.tmp package.json

      - name: Update README.md Version Badge
        run: |
          NEW_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          sed -i "s/version-[0-9]\+\.[0-9]\+\.[0-9]\+-blue/version-$NEW_VERSION-blue/g" README.md

      - name: Commit and Push Version Bump
        env:
          BYPASS_TOKEN: ${{ secrets.BYPASS_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${BYPASS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add manifest.json package.json README.md
          git commit -m "chore: bump version to ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main

      - name: Install npm dependencies
        run: npm ci

      - name: Package extension
        run: |
          chmod +x package.sh
          ./package.sh
          test -s dist/novel-dialogue-enhancer.zip

      - name: Generate Changelog
        run: |
          chmod +x generate-changelog.sh
          ./generate-changelog.sh
          test -s CHANGELOG.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"

          IS_PRERELEASE="false"
          if echo "$TAG" | grep -q '-'; then
            IS_PRERELEASE="true"
          fi

          # Create the release and capture the upload URL
          RELEASE_RESPONSE=$(curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"Release ${TAG}\",
              \"body\": $(jq -Rs . < CHANGELOG.md),
              \"prerelease\": ${IS_PRERELEASE}
            }")

          UPLOAD_URL=$(echo "$RELEASE_RESPONSE" | jq -r '.upload_url' | sed 's/{?name,label}//')

          if [ -z "$UPLOAD_URL" ] || [ "$UPLOAD_URL" = "null" ]; then
            echo "Failed to create release. Response:"
            echo "$RELEASE_RESPONSE"
            exit 1
          fi

          # Upload the packaged extension
          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/zip" \
            "${UPLOAD_URL}?name=novel-dialogue-enhancer.zip" \
            --data-binary @dist/novel-dialogue-enhancer.zip
